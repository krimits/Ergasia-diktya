name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  python-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Ergasia-diktya-master
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Syntax check
        run: python -m compileall .

      - name: Import smoke check
        run: python -c "import auction_server, peer, protocol, config"
